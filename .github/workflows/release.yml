name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build DMG and publish release
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate release tag
        run: |
          if [[ ! "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-beta\.[0-9]+)?$ ]]; then
            echo "Release tags must match vX.Y.Z or vX.Y.Z-beta.N: $GITHUB_REF_NAME" >&2
            exit 1
          fi

      - name: Set release version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install create-dmg
        run: npm install --global create-dmg

      - name: Build unsigned DMG
        env:
          BUILD_NUMBER: ${{ github.run_number }}
          SPARKLE_FEED_URL: https://github.com/${{ github.repository }}/releases/latest/download/appcast.xml
        run: scripts/package-release.sh

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DMG_PATH="$(find dist/release -maxdepth 1 -name "*.dmg" -type f | head -n 1)"
          if [[ -z "$DMG_PATH" ]]; then
            echo "Could not find release DMG." >&2
            exit 1
          fi

          RELEASE_ARGS=(
            "$GITHUB_REF_NAME"
            "$DMG_PATH"
            --title "Display Recall ${GITHUB_REF_NAME#v}"
            --generate-notes
            --verify-tag
          )

          if [[ "$GITHUB_REF_NAME" == *"-beta."* ]]; then
            RELEASE_ARGS+=(--prerelease)
          fi

          gh release create "${RELEASE_ARGS[@]}"
